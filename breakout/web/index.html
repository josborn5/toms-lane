<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TL Window</title>
<style>
	body { margin: 0; background: #111; display: flex; align-items: center; justify-content: center; height: 100vh; }
	canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

let w = 0;
let h = 0;
let wasmMemory;

function openWindow(width, height) {
	w = width;
	h = height;
	const canvas = document.getElementById('c');
	canvas.width  = w;
	canvas.height = h;
}

function consoleLog(ptr, len) {
	const bytes = new Uint8ClampedArray(wasmMemory, ptr, len);
	console.log(new TextDecoder("utf8").decode(bytes));
}

WebAssembly.instantiateStreaming(fetch('cmake-build/tl-window.wasm'), {
	env: {
		sinf:  (x) => Math.sin(x),
		cosf:  (x) => Math.cos(x),
		sqrtf: (x) => Math.sqrt(x),
		open_window: openWindow,
		console_log: consoleLog
	}
}).then(({ instance }) => {
	const exp = instance.exports;
	wasmMemory = instance.exports.memory.buffer;

	exp.tl_main();

	const canvas = document.getElementById('c');
	const ctx = canvas.getContext('2d');

	const canvasRect = canvas.getBoundingClientRect();

	// Input
	canvas.addEventListener('mousemove', e => {
		exp.tl_set_mouse(
  			(e.clientX - canvasRect.left),
  			(e.clientY - canvasRect.top),
  			e.buttons & 1
		);
	});
	document.addEventListener("keyup", e => {
		if (e.key >= " " && e.key <= "~" ) {
			const ascii_value = e.key.charCodeAt(0);
			exp.tl_set_keyup(ascii_value);
		}
	});
	document.addEventListener("keydown", e => {
		if (e.key >= " " && e.key <= "~" ) {
			const ascii_value = e.key.charCodeAt(0);
			exp.tl_set_keydown(ascii_value);
		}
	});

	// Loop
	let last = 0;
	function frame(now) {
		const dt   = last ? (now - last) | 0 : 0;
		last       = now;
		const quit = exp.tl_tick(dt);

		// Blit: view directly into WASM memory, zero copy
		const ptr  = exp.tl_pixels();
		const data = new Uint8ClampedArray(wasmMemory, ptr, w * h * 4);
		ctx.putImageData(new ImageData(data, w, h), 0, 0);

		if (!quit) requestAnimationFrame(frame);
	}
	requestAnimationFrame(frame);
});
</script>
</body>
</html>
