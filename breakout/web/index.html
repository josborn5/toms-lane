<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TL Window</title>
<style>
  body { margin: 0; background: #111; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
WebAssembly.instantiateStreaming(fetch('cmake-build/tl-window.wasm'), {
  env: {
    sinf:  (x) => Math.sin(x),
    cosf:  (x) => Math.cos(x),
    sqrtf: (x) => Math.sqrt(x),
  }
}).then(({ instance }) => {
  const exp = instance.exports;

  // Run main() — this calls OpenWindow + RunWindowUpdateLoop, registering the callback
  exp.main();

  const canvas = document.getElementById('c');
  canvas.width  = exp.tl_width();
  canvas.height = exp.tl_height();
  const ctx = canvas.getContext('2d');

  // Input
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    exp.tl_set_mouse(
      (e.clientX - r.left) * (canvas.width  / r.width)  | 0,
      (e.clientY - r.top)  * (canvas.height / r.height) | 0,
      e.buttons & 1
    );
  });

  // Loop
  let last = 0;
  function frame(now) {
    const dt   = last ? (now - last) | 0 : 0;
    last       = now;
    const quit = exp.tl_tick(dt);

    // Blit: view directly into WASM memory, zero copy
    const ptr  = exp.tl_pixels();
    const w    = exp.tl_width();
    const h    = exp.tl_height();
    const data = new Uint8ClampedArray(instance.exports.memory.buffer, ptr, w * h * 4);
    ctx.putImageData(new ImageData(data, w, h), 0, 0);

    if (!quit) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
