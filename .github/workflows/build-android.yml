name: Android CI

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: instal cmake & ndk
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --list | grep cmake

          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "cmake:3.31.6"

      - working-directory: ./breakout/android/breakout-android
        run: ./gradlew assembleDebug

