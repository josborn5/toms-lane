name: Android CI

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: instal cmake & ndk
        run: |
          echo "root\n"
          cd $ANDROID_SDK_ROOT
          ls
          echo "\n\ncmd-line-tools\n"
          cd cmdline-tools
          ls
          echo "\n\nlatest\n"
          cd latest
          ls
          echo "\n\bin\n"
          cd bin
          ls
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "cmake:3.28.3"

      - working-directory: ./breakout/android/breakout-android
        run: ./gradlew assembleDebug

