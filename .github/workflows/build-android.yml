name: Android CI

on: workflow_dispatch

permissions:
  content: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - run: ./breakout/android/breakout-android/gradlew assembleDebug

