name: Android CI

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: instal cmake & ndk
        run: |
          echo "root\n"
          cd $ANDROID_SDK_ROOT
          ls | echo
          echo "cmd-line-tools\n"
          cd cmd-line-tools
          ls | echo
          echo "latest\n"
          cd latest
          ls | echo
          echo "bin\n"
          cd bin
          le | echo
          $ANDROID_SDK_ROOT/cmd-line-tools/latest/bin/sdkmanager \
            "cmake:3.28.3"

      - working-directory: ./breakout/android/breakout-android
        run: ./gradlew assembleDebug

