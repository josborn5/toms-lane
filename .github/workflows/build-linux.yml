on: workflow_dispatch

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: libsdl-org/setup-sdl@main
      with:
        install-linux-dependencies: true
        version: 2-latest
        version-sdl-image: 2-latest

    - shell: bash
      name: build sdl2 app
      working-directory: ./application/src
      run: |
        ./sdl2.sh

    - shell: bash
      name: build test platform
      working-directory: ./platform
      run: |
        ./lib.sh

    - shell: bash
      name: build test demo
      working-directory: ./demo
      run: |
        ./lib.sh

    - shell: bash
      name: build breakout
      working-directory: ./breakout
      run: |
        ./lib.sh

    - shell: bash
      name: build test sprite-editor
      working-directory: ./sprite-editor
      run: |
        ./lib.sh

    - shell: bash
      name: build obby-1
      working-directory: ./obby-1
      run: |
        ./lib.sh

    - shell: bash
      name: build obby-2
      working-directory: ./obby-2
      run: |
        ./lib.sh

